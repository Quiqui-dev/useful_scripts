parameters:
  - name: serviceConnection
    type: string
  - name: targetEnvironment
    type: string

steps:
  - task: AzureCLI@2
    displayName: Terraform Apply
    inputs:
      azureSubscription: ${{ parameters.serviceConnection }}
      scriptType: "ps"
      scriptLocation: "inlineScript"
      inlineScript: |
        terraform apply -auto-approve -var-file="./configuration/${{parameters.targetEnvironment}}.tfvars" ./plan/${{parameters.targetEnvironment}}.plan
      addSpnToEnvironment: true
      visibleAzLogin: false
