steps:
  - script: |
      set rndName=%RANDOM%%RANDOM%
      md temp

      git config --list --name-only --show-scope > ./temp/%rndName%.config~1

      findstr /i ".insteadOf" ./temp/%rndName%.config~2

      powershell -command (Get-Content ./temp/%rndName%.config~2) -replace '(?i).insteadOf', '' ^| Set-Content ./temp/%rndName%.config~3

      echo Removing url.http sections...

      if exist ./temp/%rndName%.config~3 for /f "tokens=1,2" %%s in (./temp/%rndName%.config~3) do git config --%%s --remove-section %%t

      if exist ./temp/%rndName%.config~1 del ./temp/%rndName%.config~1
      if exist ./temp/%rndName%.config~2 del ./temp/%rndName%.config~2
      if exist temp rd temp
      set rndName=
    displayName: Clean Up Git Config
