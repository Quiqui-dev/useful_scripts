parameters:
  - name: serviceConnection
    type: string
  - name: targetEnvironment
    type: string

steps:
  - task: AzureCLI@2
    displayName: Terraform Plan
    inputs:
      azureSubscription: ${{ parameters.serviceConnection }}
      scriptType: "ps"
      scriptLocation: "inlineScript"
      inlineScript: |
        terraform plan -var-file="./configuration/${{parameters.targetEnvironment}}.tfvars" -out="./plan/${{parameters.targetEnvironment}}.plan"
      addSpnToEnvironment: true
      visibleAzLogin: false
