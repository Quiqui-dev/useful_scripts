parameters:
  - name: terraformVersion
    type: string
    default: latest

steps:
  - task: ms-devlabs.custom-terraform-tasks.custom-terraform-installer-task.TerraformInstaller@0
    inputs:
      terraformVersion: ${{ parameters.terraformVersion }}

  - task: PowerShell@2
    displayName: tf fmt check
    inputs:
      failOnStderr: true
      targetType: "inline"
      script: |
        terraform fmt -check -resursive

  # note that if you require a HTTPS_PROXY, you will add a line before the init command
  # with the proxy settings: $ENV:HTTPS_PROXY="your proxy"
  - task: PowerShell@2
    displayName: tf fmt check
    inputs:
      failOnStderr: true
      targetType: "inline"
      script: |
        terraform init -backend=false

  - task: PowerShell@2
    displayName: tf validate check
    inputs:
      failOnStderr: true
      targetType: "inline"
      script: |
        terraform validate
